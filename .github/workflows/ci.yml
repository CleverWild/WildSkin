name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:

# No League install exists on a runner required for abi_verify macro
env:
  WILDSKIN_SKIP_ABI_VERIFY: "true"

jobs:
  fmt:
    # rustfmt is platform-independent and doesn't build, so a cheap Linux
    # runner is fine even though the crates target windows-msvc. Toolchain is
    # stable per rust-toolchain.toml.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # Format workspace members only, not the vendored hudhook path dep.
      # `cargo fmt --all` descends into it despite the workspace `exclude`, and
      # rustfmt's `ignore` is nightly-only so it can't skip vendor on stable.
      # `cargo metadata --no-deps` lists members only, so the -p set is derived
      # automatically and covers a newly added crate with no hardcoded list.
      - name: Rustfmt (check)
        run: |
          members=$(cargo metadata --no-deps --format-version 1 \
            | python3 -c "import json,sys; print(' '.join('-p '+p['name'] for p in json.load(sys.stdin)['packages']))")
          cargo fmt $members -- --check

  clippy:
    # .cargo/config.toml pins target = x86_64-pc-windows-msvc; only a
    # windows-latest runner can build that natively.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - uses: Swatinem/rust-cache@v2

      # -A linker-messages: that lint is just the linker echoing the .lib/.exp
      # paths it created (see workspace.lints.rust in Cargo.toml); harmless
      # noise, not a code warning, so it's excluded from the deny-all gate.
      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings -A linker-messages

  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - uses: Swatinem/rust-cache@v2

      - name: Test
        run: cargo test --workspace
