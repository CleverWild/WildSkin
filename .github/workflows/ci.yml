name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:

# No League install exists on a runner required for abi_verify macro
env:
  WILDSKIN_SKIP_ABI_VERIFY: "true"

jobs:
  clippy:
    # .cargo/config.toml pins target = x86_64-pc-windows-msvc; only a
    # windows-latest runner can build that natively.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - uses: Swatinem/rust-cache@v2

      # -A linker-messages: that lint is just the linker echoing the .lib/.exp
      # paths it created (see workspace.lints.rust in Cargo.toml); harmless
      # noise, not a code warning, so it's excluded from the deny-all gate.
      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings -A linker-messages

  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - uses: Swatinem/rust-cache@v2

      - name: Test
        run: cargo test --workspace
