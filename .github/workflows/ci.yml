name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:

jobs:
  clippy:
    # .cargo/config.toml pins target = x86_64-pc-windows-msvc; only a
    # windows-latest runner can build that natively.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      # restore/save split (not plain `cache@v4`) so the cache is still saved
      # when clippy fails — `cache@v4`'s save is `post-if: success()`. Same
      # key as release.yml so the two workflows share one cache.
      - name: Restore cargo registry
        id: cargo-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-registry-

      # -A linker-messages: that lint is just the linker echoing the .lib/.exp
      # paths it created (see workspace.lints.rust in Cargo.toml); harmless
      # noise, not a code warning, so it's excluded from the deny-all gate.
      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings -A linker-messages

      - name: Save cargo registry
        if: always() && steps.cargo-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-registry-${{ hashFiles('**/Cargo.lock') }}
