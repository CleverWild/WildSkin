name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Tag to publish as (e.g. v16.14)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  # Reuses ci.yml's clippy gate so a release build never ships code that
  # would fail the warnings-as-errors check.
  ci:
    uses: ./.github/workflows/ci.yml

  build:
    needs: ci
    runs-on: windows-latest
    # TAG_NAME: the tag this run publishes under, for whichever trigger fired:
    # the tag itself for a `push` (already exists as a ref), or the manual
    # input for a `workflow_dispatch` (created fresh by `gh release create`
    # below, since that command creates its underlying tag if absent).
    # Condition on `startsWith(ref, 'refs/tags/')`, not `event_name`: its
    # true-branch (github.ref_name) is guaranteed non-empty there, so this
    # side-steps the `A && B || C` idiom's usual trap where a falsy/empty `B`
    # (a workflow_dispatch run with the tag_name input left blank) would
    # wrongly fall through to `C`.
    env:
      TAG_NAME: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || github.event.inputs.tag_name }}
    steps:
      # fetch-depth: 0 gets full history + all tags for the changelog step
      # to diff against the previous release tag.
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      # Fail fast: `gh release create` only errors on a duplicate tag at the
      # very end, after the ~30-min obfuscated build. Check up front so a
      # re-run against an existing release dies in seconds, not half an hour.
      - name: Ensure the release does not already exist
        if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.tag_name != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "${{ env.TAG_NAME }}" *> $null
          if ($LASTEXITCODE -eq 0) {
            Write-Host "::error::A release for ${{ env.TAG_NAME }} already exists. Delete it or bump the tag."
            exit 1
          }
          exit 0

      # The injector is a separate private repo, absent from the public
      # checkout; pull it into WildSkin-injector/ so xtask picks it up.
      - name: Checkout injector
        uses: actions/checkout@v7
        with:
          repository: CleverWild/WildSkin-injector
          path: WildSkin-injector
          token: ${{ secrets.INJECTOR_TOKEN }}

      # Caches ~/.cargo + the compiled target dir (the ~200 dependency crates),
      # which the manual registry-only cache never did; that's the bulk of the
      # ~30-min Build below. Covers the root workspace's target/ only. The
      # injector builds via its own separate manifest/lockfile, so its target/
      # is outside this cache's scope.
      #
      # `key` busts the whole target cache when the ollvm toolchain version
      # changes (RELEASE_TAG in cmd_setup_ollvm.rs): the --obfuscate build
      # compiles deps with that toolchain, so stale .rlibs from an older
      # obfuscator must not be reused. rust-cache keys on Cargo.lock + the
      # default rustc, but not on the separately-linked ollvm toolchain.
      #
      # No conflict with the ollvm cache below: rust-cache's post-job cleanup
      # strips target/ollvm-toolchain (keeps only build/.fingerprint/deps per
      # dir), but that runs after "Save ollvm toolchain" has already persisted
      # it, so the toolchain is neither lost nor duplicated into this cache.
      #
      # cache-on-failure: a build that dies after compiling deps still saves
      # them for the next attempt (the manual restore/save split did this too).
      - uses: Swatinem/rust-cache@v2
        with:
          key: ollvm-${{ hashFiles('xtask/src/cmd_setup_ollvm.rs') }}
          cache-on-failure: true

      # windows-latest ships Rust/rustup preinstalled; rustup auto-installs
      # the toolchain pinned by rust-toolchain.toml on first cargo invocation.

      # --obfuscate needs the ollvm toolchain; setup-ollvm downloads+links it
      # and is idempotent, so it's safe to run every time. The download
      # itself is what's cached here, keyed on the file that pins its
      # version (RELEASE_TAG in cmd_setup_ollvm.rs) so a version bump busts
      # the cache automatically instead of silently reusing a stale build.
      - name: Restore ollvm toolchain
        id: ollvm-cache
        uses: actions/cache/restore@v6
        with:
          path: target/ollvm-toolchain
          key: ollvm-${{ hashFiles('xtask/src/cmd_setup_ollvm.rs') }}

      - name: Setup ollvm toolchain
        id: setup-ollvm
        run: cargo xtask setup-ollvm

      # Saves run even on failure (`if: always()`), so a failed build still
      # persists what it already downloaded for the next attempt. Only save the
      # ollvm toolchain if its download actually succeeded, or a half-downloaded
      # tree would poison the cache. Skip when the exact key was already a hit.
      - name: Save ollvm toolchain
        if: always() && steps.setup-ollvm.outcome == 'success' && steps.ollvm-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6
        with:
          path: target/ollvm-toolchain
          key: ollvm-${{ hashFiles('xtask/src/cmd_setup_ollvm.rs') }}

      - name: Build
        run: cargo xtask build --obfuscate

      - uses: actions/upload-artifact@v7
        with:
          name: WildSkin
          path: |
            target/x86_64-pc-windows-msvc/release/WildSkin.dll
            WildSkin-injector/target/x86_64-pc-windows-msvc/release/WildSkin_Injector.exe

      # `--target` pins the tag to this exact commit, required for a
      # manual-dispatch run, where the tag doesn't exist as a ref yet and
      # `gh release create` creates it fresh (a real tag push already has
      # its tag pointed at the pushed commit, so this is a no-op there).
      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.tag_name != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create "${{ env.TAG_NAME }}"
          target/x86_64-pc-windows-msvc/release/WildSkin.dll
          WildSkin-injector/target/x86_64-pc-windows-msvc/release/WildSkin_Injector.exe
          --target ${{ github.sha }}
          --generate-notes

      # `--generate-notes` above pulls from merged PRs, which this repo does
      # not use (direct pushes to main), so it never has real content beyond
      # the "Full Changelog" link. Generate a grouped changelog with git-cliff
      # (conventional-commit types -> sections, see cliff.toml) instead.
      - name: Compute changelog range
        id: range
        if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.tag_name != ''
        run: |
          # Walk back from the built commit (github.sha), not the tag ref: a
          # manual-dispatch tag was only just created above and this checkout
          # never fetched it back, so a tag-name lookup would find nothing.
          # prevTag..sha is exactly one release's commits (no intermediate tag),
          # so git-cliff renders a single grouped section.
          $prevTag = git describe --tags --abbrev=0 "${{ github.sha }}^" 2>$null
          $range = if ($prevTag) { "$prevTag..${{ github.sha }}" } else { "${{ github.sha }}" }
          "range=$range" | Out-File -Append -FilePath $env:GITHUB_OUTPUT

      - name: Generate changelog
        id: changelog
        if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.tag_name != ''
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: ${{ steps.range.outputs.range }} --strip all
          output: release-changelog.md

      - name: Append changelog to release notes
        if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.tag_name != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $body = gh release view "${{ env.TAG_NAME }}" --json body -q .body
          $changelog = (Get-Content -Raw release-changelog.md).Trim()
          @($body, "", "## Changes", "", $changelog) | Set-Content -Path changelog-notes.md
          gh release edit "${{ env.TAG_NAME }}" --notes-file changelog-notes.md

      # Scan the published artifacts on VirusTotal. `update_release_body`
      # (the action's own feature for this) only fires for a `release`
      # event, not the `push`-tag event this workflow runs on, so the
      # links are appended manually in the next step instead.
      - name: Scan on VirusTotal
        id: virustotal
        if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.tag_name != ''
        uses: crazy-max/ghaction-virustotal@v5
        with:
          vt_api_key: ${{ secrets.VT_API_KEY }}
          files: |
            target/x86_64-pc-windows-msvc/release/WildSkin.dll
            WildSkin-injector/target/x86_64-pc-windows-msvc/release/WildSkin_Injector.exe

      - name: Append VirusTotal links to release notes
        if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.tag_name != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # analysis output is `file=url,file=url`; split on the first `=`
          # only, since the VT URLs themselves end in a base64 `==`.
          $links = "${{ steps.virustotal.outputs.analysis }}" -split ',' | ForEach-Object {
            $file, $url = $_ -split '=', 2
            "- [$file]($url)"
          }
          $body = gh release view "${{ env.TAG_NAME }}" --json body -q .body
          @($body, "", "## VirusTotal") + $links | Set-Content -Path vt-notes.md
          gh release edit "${{ env.TAG_NAME }}" --notes-file vt-notes.md
